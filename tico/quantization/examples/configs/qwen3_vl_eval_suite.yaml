model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cuda
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  datasets:
    - dataset: vqav2
      split: testdev
      n_samples: 128
    - dataset: wikitext2
      split: train
      n_samples: 128
  seq_len: 2048

model_args:
  vision:
    grid_thw: [8, 24, 24]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline:
  - name: spinquant
    enabled: true
    init_method: random
    r1_path: null
    r2_map_path: null
    enable_r1: true
    enable_r2: true
    fuse_deepstack_visual_outputs: true
    vision_init_method: random
    vision_r1_path: null
    vision_r2_map_path: null
    enable_vision_r1: true
    enable_vision_r2: true
    fuse_vision_layer_norms: true
    require_vision_r1_layernorm_compatible: true
    vision_rotation_tolerance: 1.0e-4

  - name: smoothquant
    enabled: false
    alpha: 0.5
    components: both
    custom_alpha_map: null

  - name: gptq
    enabled: true
    weight_bits: 4
    weight_bits_overrides: {}
    perchannel: true
    symmetric: false
    mse: null
    sensitivity:
      mode: compute
      path: null
    percdamp: 0.01
    groupsize: -1
    actorder: true
    static_groups: false
    verbose: false
    show_progress: true
    quantize_vision: true
    quantize_text: true
    quantize_lm_head: false
    quantize_vision_patch_embed: true
    quantize_vision_blocks: true
    quantize_vision_merger: true
    quantize_vision_deepstack_mergers: true
    quantize_text_layers: true
    move_cache_to_cpu: false

  - name: ptq
    enabled: true
    activation: int16
    linear_weight: uint4
    vision_patch_embed_weight: uint8
    embedding_weight: uint8
    lm_head_weight: uint8
    spin_rotation_weight: int16
    norm: int16
    norm_weight: int16
    strict_wrap: true

evaluation:
  enabled: true
  vlm_tasks:
    - vqav2
    - textvqa
  coco: true
  # LLaVA-Bench is open-ended natural QA. The legacy CIDEr/BLEU path is not
  # enabled by default here. Use mode=judge for benchmark-style scoring.
  llava_bench:
    enabled: false
    mode: judge
    dataset: lmms-lab/llava-bench-in-the-wild
    split: train
    n_samples: 50
    start_index: 0
    max_seq_len: 2048
    max_new_tokens: 512
    temperature: 0.0
    candidate_label: Qwen/Qwen3-VL-2B-Instruct
    baseline_label: reference
    candidate_answers: null
    baseline_answers: null
    regenerate: false
    output:
      dir: ./out/llava_bench
      answers: ./out/llava_bench/qwen3_vl_2b.answers.jsonl
      reviews: ./out/llava_bench/qwen3_vl_2b.llama3_2_3b.reviews.jsonl
      summary: ./out/llava_bench/qwen3_vl_2b.llama3_2_3b.summary.json
    judge:
      enabled: true
      model_id: meta-llama/Llama-3.2-3B-Instruct
      device: cuda
      dtype: float16
      max_new_tokens: 256
      temperature: 0.0
      swap_order: true
  videomme:
    enabled: true
    batch_size: 1
    max_new_tokens: 30
    n_samples: -1
    max_num_frames: 32
    use_cache: null
    verbose: false
  mmlu:
    enabled: true
    subjects: null
    n_shots: 5
    n_samples: -1
    batch_size: 1
  hellaswag:
    enabled: true
    n_shots: 10
    n_samples: -1
    batch_size: 1
  mmmu:
    enabled: true
    dataset: MMMU/MMMU
    subjects: null
    n_shots: 5
    n_samples: -1
    max_new_tokens: 16
    temperature: 0.0
    verbose: false
  ppl:
    enabled: true
    dataset: wikitext2
    split: test
    stride: 512
  n_samples: -1
  max_seq_len: 2048

export:
  enabled: false
  output_dir: ./out/qwen3_vl_eval_suite
  artifacts:
    - ptq_checkpoint
