# Judge-based LLaVA-Bench-in-the-Wild evaluation for Qwen3-VL.
#
# This config is consumed by the regular evaluate entry point:
#   python -m tico.quantization.examples.evaluate --config <this-file>
#
# The default Llama 3.2 3B judge is intended for inexpensive regression checks.
# Scores are not directly comparable to official LLaVA-Bench GPT-4-judge scores.

model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cuda
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  dataset: vqav2
  split: testdev
  n_samples: 1
  seq_len: 2048

model_args:
  vision:
    grid_thw: [8, 24, 24]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline: []

evaluation:
  enabled: true
  vlm_tasks: []
  coco: false
  llava_bench:
    enabled: true
    mode: judge
    dataset: lmms-lab/llava-bench-in-the-wild
    split: train
    n_samples: 50
    start_index: 0
    # Static-context settings for 2048-token runtime evaluation. Images are
    # resized before processor tokenization so the processed visual tokens fit
    # the input budget reserved below.
    max_seq_len: 2048
    max_new_tokens: 512
    temperature: 0.0
    image_max_pixels: 602112  # 768 * 28 * 28
    image_min_pixels: null
    resized_height: null
    resized_width: null
    visual_token_margin: 256
    candidate_label: Qwen/Qwen3-VL-4B-Instruct
    baseline_label: reference
    candidate_answers: null
    baseline_answers: null
    regenerate: false
    output:
      dir: ./out/llava_bench
      answers: ./out/llava_bench/answers.jsonl
      reviews: ./out/llava_bench/reviews.jsonl
      summary: ./out/llava_bench/summary.json
    judge:
      enabled: true
      model_id: meta-llama/Llama-3.2-3B-Instruct
      device: cuda
      dtype: float16
      max_new_tokens: 256
      temperature: 0.0
      swap_order: true

  mmlu:
    enabled: false
  hellaswag:
    enabled: false
  mmmu:
    enabled: false
  ppl:
    enabled: false

export:
  enabled: false
  output_dir: ./out/qwen3_vl_llava_bench_judge
  artifacts: []
