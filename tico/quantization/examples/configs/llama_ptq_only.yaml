model:
  family: llama
  name_or_path: Maykeye/TinyLLama-v0
  trust_remote_code: false
  hf_token: null
  cache_dir: null

runtime:
  device: cpu
  dtype: float32
  seed: 42
  show_progress: true

model_args:
  profile: reference_eval

calibration:
  dataset: wikitext
  dataset_config: wikitext-2-raw-v1
  split: train
  n_samples: 8
  seq_len: 256
  decode_steps: 0

pipeline:
  - name: ptq
    enabled: true
    profile: reference_eval
    activation_dtype: int16
    default_qscheme: per_tensor_symm
    linear_weight_bits: 8
    embedding_weight_bits: 8
    lm_head_weight_bits: 8
    norm_weight_dtype: int16
    strict_wrap: true

evaluation:
  enabled: false
  perplexity:
    dataset: wikitext
    dataset_config: wikitext-2-raw-v1
    split: test
  lm_eval_tasks: null
  max_seq_len: 256

export:
  enabled: false
  output_dir: ./out/llama_ptq
  max_seq_len: 256
  artifacts:
    - ptq_checkpoint
