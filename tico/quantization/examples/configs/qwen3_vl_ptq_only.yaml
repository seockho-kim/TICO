model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cpu
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  dataset: vqav2
  n_samples: 4
  seq_len: 512

model_args:
  vision:
    grid_thw: [1, 8, 8]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline:
  - name: spinquant
    enabled: false
    init_method: random
    disable_r1: false
    disable_r2: false
    disable_deepstack_fusion: false
    r1_path: null
    r2_map_path: null

  - name: ptq
    enabled: true
    activation_dtype: int16
    default_qscheme: per_tensor_symm
    linear_weight_bits: 8
    vision_patch_embed_weight_bits: 8
    embedding_weight_bits: 8
    lm_head_weight_bits: 8
    norm_dtype: int16
    norm_weight_dtype: int16
    strict_wrap: true

evaluation:
  enabled: false
  vlm_tasks:
    - vqav2
  coco: false
  llava_bench: false
  mmlu:
    enabled: false
  hellaswag:
    enabled: false
    n_shots: 10
    n_samples: -1
    batch_size: 1
  mmmu:
    enabled: false
    dataset: MMMU/MMMU
  ppl:
    enabled: false
  n_samples: 10
  max_seq_len: 512

export:
  enabled: false
  output_dir: ./out/qwen3_vl_ptq
  artifacts:
    - ptq_checkpoint
